# ==========================================
# SPRING RUNTIME SERVER CONFIG
# ==========================================
server.port=8080
server.servlet.context-path=/api

# ==========================================
# MICROSOFT SQL SERVER DATASOURCE (CNY.sql)
# ==========================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=CNY;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=sa
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==========================================
# JPA / HIBERNATE ORM CONFIGURATION
# ==========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2016Dialect

# ==========================================
# JACKSON CONFIGURATION FOR DATE-TIME
# ==========================================
spring.jackson.serialization.write-dates-as-timestamps=false
