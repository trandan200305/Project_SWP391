<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CNY Database Schema Diagram</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;overflow:hidden;font-family:'Segoe UI',Consolas,monospace;width:100vw;height:100vh}
#wrap{width:100%;height:100%;position:relative;overflow:hidden;
  background-image:linear-gradient(rgba(48,54,61,.25) 1px,transparent 1px),linear-gradient(90deg,rgba(48,54,61,.25) 1px,transparent 1px);
  background-size:40px 40px}
#pan{position:absolute;transform-origin:0 0}
.nd{position:absolute;background:#161b22;border:1.5px solid #30363d;border-radius:6px;padding:8px 16px;color:#c9d1d9;font-size:12px;font-weight:500;cursor:grab;user-select:none;white-space:nowrap;z-index:10;transition:border-color .15s,box-shadow .15s}
.nd:hover{border-color:#58a6ff;box-shadow:0 0 10px rgba(88,166,255,.15);z-index:20}
.nd.a{border-color:#3fb950;color:#7ee787}
.nd.a:hover{box-shadow:0 0 10px rgba(63,185,80,.2)}
.nd.j{border-color:#d29922;color:#e3b341}
.nd.j:hover{box-shadow:0 0 10px rgba(210,153,34,.2)}
svg{position:absolute;top:0;left:0;pointer-events:none;z-index:5}
svg line{stroke:#30363d;stroke-width:1}
svg polygon{fill:#484f58}
#hud{position:fixed;top:12px;left:12px;z-index:100;color:#58a6ff;font-size:15px;font-weight:600}
#hud span{color:#484f58;font-weight:400;font-size:12px}
#ctrl{position:fixed;top:12px;right:12px;z-index:100;display:flex;gap:6px}
#ctrl button{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
#ctrl button:hover{background:#30363d}
#leg{position:fixed;bottom:12px;left:12px;z-index:100;display:flex;gap:14px;font-size:11px;color:#8b949e}
.li{display:flex;align-items:center;gap:5px}
.ld{width:10px;height:10px;border-radius:3px;border:1.5px solid}
</style>
</head>
<body>
<div id="hud">CNY Database Schema <span>— 45 tables • kéo để di chuyển • cuộn để zoom</span></div>
<div id="ctrl"><button onclick="fit()">Fit All</button><button onclick="resetV()">Reset</button></div>
<div id="leg">
<div class="li"><div class="ld" style="border-color:#3fb950"></div>Actor</div>
<div class="li"><div class="ld" style="border-color:#d29922"></div>Junction</div>
<div class="li"><div class="ld" style="border-color:#30363d"></div>Regular</div>
<div class="li"><span style="color:#484f58">——→</span> FK</div>
</div>
<div id="wrap"><div id="pan"></div></div>
<script>
const T=[
// Core Actors
{id:'freelancers',x:450,y:60,t:'a'},{id:'employers',x:1250,y:60,t:'a'},{id:'admins',x:2000,y:60,t:'a'},
// Taxonomy
{id:'job_categories',x:1000,y:0,t:''},{id:'skills',x:800,y:200,t:''},
// Freelancer profile
{id:'educations',x:50,y:230,t:''},{id:'experiences',x:230,y:230,t:''},{id:'portfolios',x:420,y:230,t:''},{id:'freelancer_skills',x:620,y:300,t:'j'},
{id:'portfolio_files',x:420,y:390,t:''},
// Projects
{id:'projects',x:1080,y:200,t:''},{id:'project_skills',x:920,y:370,t:'j'},{id:'project_attachments',x:1120,y:370,t:''},
{id:'saved_jobs',x:720,y:460,t:'j'},{id:'proposals',x:880,y:520,t:''},
// Contracts flow
{id:'contracts',x:1320,y:340,t:''},{id:'milestones',x:1320,y:490,t:''},{id:'deliverables',x:1320,y:640,t:''},{id:'deliverable_files',x:1320,y:790,t:''},
// Finance
{id:'wallets',x:450,y:460,t:''},{id:'transactions',x:350,y:620,t:''},{id:'payment_gateway_logs',x:350,y:780,t:''},
{id:'escrow_transactions',x:1520,y:560,t:''},{id:'bank_accounts',x:580,y:620,t:''},{id:'withdrawal_requests',x:580,y:780,t:''},
{id:'platform_fee_configs',x:2000,y:230,t:''},
// Reviews & Moderation
{id:'reviews',x:1550,y:340,t:''},{id:'user_warnings',x:1750,y:340,t:''},
{id:'disputes',x:1550,y:490,t:''},{id:'dispute_evidences',x:1550,y:640,t:''},{id:'dispute_decisions',x:1760,y:640,t:''},
// KYC
{id:'kyc_requests',x:1920,y:390,t:''},{id:'kyc_documents',x:1920,y:540,t:''},
// Communication
{id:'conversations',x:50,y:560,t:''},{id:'conversation_participants',x:30,y:720,t:'j'},{id:'messages',x:210,y:720,t:''},{id:'message_attachments',x:210,y:870,t:''},
// Support
{id:'support_tickets',x:2000,y:490,t:''},{id:'ticket_messages',x:2000,y:640,t:''},{id:'ticket_attachments',x:2000,y:790,t:''},
// System
{id:'notifications',x:800,y:680,t:''},{id:'login_history',x:800,y:830,t:''},{id:'user_status_history',x:1020,y:830,t:''},
{id:'admin_audit_logs',x:2220,y:230,t:''},{id:'newsletter_subscribers',x:1020,y:680,t:''}
];
const E=[
['login_history','freelancers'],['login_history','employers'],['login_history','admins'],
['user_status_history','freelancers'],['user_status_history','employers'],
['skills','job_categories'],
['freelancer_skills','freelancers'],['freelancer_skills','skills'],
['educations','freelancers'],['experiences','freelancers'],['portfolios','freelancers'],['portfolio_files','portfolios'],
['projects','employers'],['projects','job_categories'],['projects','admins'],
['project_skills','projects'],['project_skills','skills'],['project_attachments','projects'],
['saved_jobs','freelancers'],['saved_jobs','projects'],
['proposals','projects'],['proposals','freelancers'],
['contracts','projects'],['contracts','freelancers'],['contracts','employers'],
['milestones','contracts'],['deliverables','milestones'],['deliverable_files','deliverables'],
['wallets','freelancers'],['wallets','employers'],
['transactions','wallets'],['payment_gateway_logs','transactions'],
['escrow_transactions','contracts'],['escrow_transactions','milestones'],
['bank_accounts','freelancers'],['bank_accounts','employers'],
['withdrawal_requests','freelancers'],['withdrawal_requests','bank_accounts'],['withdrawal_requests','admins'],
['platform_fee_configs','admins'],
['reviews','contracts'],['reviews','freelancers'],['reviews','employers'],
['user_warnings','freelancers'],['user_warnings','employers'],['user_warnings','admins'],
['disputes','contracts'],['disputes','freelancers'],['disputes','employers'],
['dispute_evidences','disputes'],['dispute_evidences','freelancers'],['dispute_evidences','employers'],
['dispute_decisions','disputes'],['dispute_decisions','admins'],
['kyc_requests','freelancers'],['kyc_requests','employers'],['kyc_requests','admins'],['kyc_documents','kyc_requests'],
['conversation_participants','conversations'],['conversation_participants','freelancers'],['conversation_participants','employers'],
['messages','conversations'],['messages','freelancers'],['messages','employers'],['message_attachments','messages'],
['support_tickets','freelancers'],['support_tickets','employers'],['support_tickets','admins'],
['ticket_messages','support_tickets'],['ticket_messages','freelancers'],['ticket_messages','employers'],['ticket_messages','admins'],
['ticket_attachments','ticket_messages'],
['notifications','freelancers'],['notifications','employers'],['notifications','admins'],
['newsletter_subscribers','freelancers'],['newsletter_subscribers','employers'],
['admin_audit_logs','admins'],['job_categories','job_categories']
];

const pan=document.getElementById('pan'),wrap=document.getElementById('wrap');
let sc=1,ox=0,oy=0,nodes={},drag=null,mx=0,my=0;

// Create nodes
T.forEach(t=>{
  const d=document.createElement('div');
  d.className='nd'+(t.t==='a'?' a':t.t==='j'?' j':'');
  d.textContent=t.id;
  d.style.left=t.x+'px';d.style.top=t.y+'px';
  d.dataset.id=t.id;
  pan.appendChild(d);
  nodes[t.id]={el:d,x:t.x,y:t.y,w:0,h:0};
});

// Measure nodes
Object.values(nodes).forEach(n=>{n.w=n.el.offsetWidth;n.h=n.el.offsetHeight});

// SVG for lines
const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
svg.id='lines';
svg.setAttribute('width','4000');svg.setAttribute('height','2000');
pan.insertBefore(svg,pan.firstChild);

function edgePt(a,b){
  // Find closest edge points between two rectangles
  let ax=a.x+a.w/2,ay=a.y+a.h/2,bx=b.x+b.w/2,by=b.y+b.h/2;
  let dx=bx-ax,dy=by-ay;
  // Clip to box a edge
  let sx,sy;
  if(Math.abs(dx)*a.h>Math.abs(dy)*a.w){sx=ax+(dx>0?a.w/2:-a.w/2);sy=ay+dy*(a.w/2)/Math.abs(dx)}
  else{sy=ay+(dy>0?a.h/2:-a.h/2);sx=ax+dx*(a.h/2)/Math.abs(dy||1)}
  // Clip to box b edge
  let ex,ey;dx=-dx;dy=-dy;
  if(Math.abs(dx)*b.h>Math.abs(dy)*b.w){ex=bx+(dx>0?b.w/2:-b.w/2);ey=by+dy*(b.w/2)/Math.abs(dx)}
  else{ey=by+(dy>0?b.h/2:-b.h/2);ex=bx+dx*(b.h/2)/Math.abs(dy||1)}
  return{x1:sx,y1:sy,x2:ex,y2:ey}
}

function arrow(x1,y1,x2,y2){
  let a=Math.atan2(y2-y1,x2-x1),s=7;
  let p1x=x2-s*Math.cos(a-Math.PI/7),p1y=y2-s*Math.sin(a-Math.PI/7);
  let p2x=x2-s*Math.cos(a+Math.PI/7),p2y=y2-s*Math.sin(a+Math.PI/7);
  return `${x2},${y2} ${p1x},${p1y} ${p2x},${p2y}`
}

function drawLines(){
  svg.innerHTML='';
  E.forEach(([f,t])=>{
    if(!nodes[f]||!nodes[t])return;
    if(f===t)return; // skip self-ref
    const a=nodes[f],b=nodes[t];
    const p=edgePt(a,b);
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',p.x1);l.setAttribute('y1',p.y1);l.setAttribute('x2',p.x2);l.setAttribute('y2',p.y2);
    svg.appendChild(l);
    const pg=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    pg.setAttribute('points',arrow(p.x1,p.y1,p.x2,p.y2));
    svg.appendChild(pg);
  });
}
drawLines();

// Dragging
pan.addEventListener('mousedown',e=>{
  const nd=e.target.closest('.nd');
  if(nd){drag=nodes[nd.dataset.id];mx=e.clientX;my=e.clientY;nd.style.cursor='grabbing';e.preventDefault()}
});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  let dx=(e.clientX-mx)/sc,dy=(e.clientY-my)/sc;
  drag.x+=dx;drag.y+=dy;
  drag.el.style.left=drag.x+'px';drag.el.style.top=drag.y+'px';
  mx=e.clientX;my=e.clientY;
  drawLines();
});
window.addEventListener('mouseup',()=>{if(drag){drag.el.style.cursor='grab';drag=null}});

// Pan
let panning=false,px,py;
wrap.addEventListener('mousedown',e=>{
  if(e.target===wrap||e.target===pan||e.target===svg){panning=true;px=e.clientX;py=e.clientY;wrap.style.cursor='grabbing'}
});
window.addEventListener('mousemove',e=>{
  if(!panning)return;
  ox+=e.clientX-px;oy+=e.clientY-py;
  px=e.clientX;py=e.clientY;
  pan.style.transform=`translate(${ox}px,${oy}px) scale(${sc})`;
});
window.addEventListener('mouseup',()=>{if(panning){panning=false;wrap.style.cursor='default'}});

// Zoom
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  let d=e.deltaY>0?0.9:1.1,ns=Math.max(0.2,Math.min(3,sc*d));
  let r=e.getBoundingClientRect?wrap.getBoundingClientRect():{left:0,top:0};
  let mx2=e.clientX-r.left,my2=e.clientY-r.top;
  ox=mx2-(mx2-ox)*(ns/sc);oy=my2-(my2-oy)*(ns/sc);
  sc=ns;
  pan.style.transform=`translate(${ox}px,${oy}px) scale(${sc})`;
},{passive:false});

function resetV(){sc=1;ox=0;oy=0;pan.style.transform=`translate(0,0) scale(1)`}
function fit(){
  let mn={x:Infinity,y:Infinity},mx2={x:-Infinity,y:-Infinity};
  Object.values(nodes).forEach(n=>{
    if(n.x<mn.x)mn.x=n.x;if(n.y<mn.y)mn.y=n.y;
    if(n.x+n.w>mx2.x)mx2.x=n.x+n.w;if(n.y+n.h>mx2.y)mx2.y=n.y+n.h;
  });
  let w=mx2.x-mn.x+80,h=mx2.y-mn.y+80;
  let sw=wrap.clientWidth/w,sh=wrap.clientHeight/h;
  sc=Math.min(sw,sh,1.5);
  ox=-mn.x*sc+(wrap.clientWidth-w*sc)/2+40*sc;
  oy=-mn.y*sc+(wrap.clientHeight-h*sc)/2+40*sc;
  pan.style.transform=`translate(${ox}px,${oy}px) scale(${sc})`;
}
setTimeout(fit,100);
</script>
</body>
</html>
