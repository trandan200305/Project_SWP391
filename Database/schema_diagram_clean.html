<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>CNY Database Schema - Clean View</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;overflow:hidden;font-family:'Segoe UI',Consolas,monospace;width:100vw;height:100vh}
#wrap{width:100%;height:100%;position:relative;overflow:hidden;
  background-image:linear-gradient(rgba(48,54,61,.2) 1px,transparent 1px),linear-gradient(90deg,rgba(48,54,61,.2) 1px,transparent 1px);
  background-size:50px 50px}
#pan{position:absolute;transform-origin:0 0}
.nd{position:absolute;background:#161b22;border:1.5px solid #30363d;border-radius:6px;padding:9px 18px;color:#c9d1d9;font-size:12.5px;font-weight:500;cursor:grab;user-select:none;white-space:nowrap;z-index:10;transition:border-color .2s,box-shadow .2s}
.nd:hover{border-color:#58a6ff;box-shadow:0 0 12px rgba(88,166,255,.2);z-index:20}
.nd.a{border-color:#3fb950;color:#7ee787}.nd.a:hover{box-shadow:0 0 12px rgba(63,185,80,.25)}
.nd.j{border-color:#d29922;color:#e3b341}.nd.j:hover{box-shadow:0 0 12px rgba(210,153,34,.25)}
svg{position:absolute;top:0;left:0;pointer-events:none;z-index:5}
svg line{stroke:rgba(88,166,255,.18);stroke-width:1.2}
svg polygon{fill:rgba(88,166,255,.3)}
#hud{position:fixed;top:12px;left:12px;z-index:100;color:#58a6ff;font-size:15px;font-weight:600}
#hud span{color:#484f58;font-weight:400;font-size:12px}
#ctrl{position:fixed;top:12px;right:12px;z-index:100;display:flex;gap:6px}
#ctrl button{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
#ctrl button:hover{background:#30363d}
#leg{position:fixed;bottom:12px;left:12px;z-index:100;display:flex;gap:14px;font-size:11px;color:#8b949e}
.li{display:flex;align-items:center;gap:5px}
.ld{width:10px;height:10px;border-radius:3px;border:1.5px solid}
</style>
</head>
<body>
<div id="hud">CNY Schema (Clean) <span>— 49 tables • 1 đường/cặp bảng • kéo + cuộn zoom</span></div>
<div id="ctrl"><button onclick="fit()">Fit All</button><button onclick="resetV()">Reset</button></div>
<div id="leg">
<div class="li"><div class="ld" style="border-color:#3fb950"></div>Actor</div>
<div class="li"><div class="ld" style="border-color:#d29922"></div>Junction</div>
<div class="li"><div class="ld" style="border-color:#30363d"></div>Regular</div>
</div>
<div id="wrap"><div id="pan"></div></div>
<script>
// ===== TABLES - positioned in 3 zones to reduce line crossings =====
const T=[
// ---- FREELANCER ZONE (left) ----
{id:'freelancers',x:380,y:50,t:'a'},
{id:'educations',x:30,y:250,t:''},{id:'experiences',x:220,y:250,t:''},{id:'portfolios',x:420,y:250,t:''},
{id:'freelancer_skills',x:160,y:420,t:'j'},{id:'portfolio_files',x:420,y:420,t:''},
{id:'wallets',x:80,y:580,t:''},{id:'bank_accounts',x:300,y:580,t:''},
{id:'transactions',x:80,y:740,t:''},{id:'withdrawal_requests',x:300,y:740,t:''},
{id:'payment_gateway_logs',x:80,y:900,t:''},
{id:'conversations',x:520,y:580,t:''},{id:'conversation_participants',x:490,y:740,t:'j'},
{id:'messages',x:690,y:740,t:''},{id:'message_attachments',x:690,y:900,t:''},

// ---- PROJECT ZONE (center) ----
{id:'job_categories',x:1050,y:0,t:''},{id:'skills',x:830,y:170,t:''},
{id:'employers',x:1200,y:50,t:'a'},
{id:'projects',x:1050,y:280,t:''},
{id:'project_skills',x:830,y:430,t:'j'},{id:'project_attachments',x:1050,y:430,t:''},
{id:'saved_jobs',x:630,y:430,t:'j'},{id:'proposals',x:780,y:580,t:''},
{id:'contracts',x:1100,y:580,t:''},{id:'reviews',x:1350,y:430,t:''},
{id:'milestones',x:1100,y:740,t:''},{id:'escrow_transactions',x:1320,y:740,t:''},
{id:'deliverables',x:1100,y:900,t:''},{id:'deliverable_files',x:1100,y:1060,t:''},

// ---- SHARED (bottom center) ----
{id:'notifications',x:830,y:900,t:''},{id:'newsletter_subscribers',x:620,y:900,t:''},
{id:'login_history',x:520,y:1060,t:''},{id:'user_status_history',x:750,y:1060,t:''},

// ---- ADMIN ZONE (right) ----
{id:'admins',x:1900,y:50,t:'a'},
{id:'platform_fee_configs',x:1700,y:250,t:''},{id:'admin_audit_logs',x:1930,y:250,t:''},
{id:'user_warnings',x:2120,y:400,t:''},{id:'kyc_requests',x:1900,y:430,t:''},
{id:'kyc_documents',x:1900,y:600,t:''},
{id:'support_tickets',x:1700,y:530,t:''},{id:'ticket_messages',x:1700,y:700,t:''},{id:'ticket_attachments',x:1700,y:870,t:''},
{id:'disputes',x:2100,y:560,t:''},{id:'dispute_evidences',x:2050,y:730,t:''},{id:'dispute_decisions',x:2280,y:730,t:''},

// ---- CMS & SETTINGS ZONE (right side) ----
{id:'site_settings',x:1500,y:80,t:''},
{id:'seo_configs',x:1500,y:230,t:''},
{id:'article_categories',x:1500,y:380,t:''},
{id:'articles',x:1500,y:530,t:''}
];

// ===== EDGES - deduplicated: max 1 line per table pair =====
const rawE=[
  ['login_history', 'freelancers'], ['login_history', 'employers'], ['login_history', 'admins'],
  ['user_status_history', 'freelancers'], ['user_status_history', 'employers'],
  ['job_categories', 'job_categories'], ['skills', 'job_categories'],
  ['freelancer_skills', 'freelancers'], ['freelancer_skills', 'skills'],
  ['educations', 'freelancers'], ['experiences', 'freelancers'], ['portfolios', 'freelancers'], ['portfolio_files', 'portfolios'],
  ['projects', 'employers'], ['projects', 'job_categories'], ['projects', 'admins'],
  ['project_skills', 'projects'], ['project_skills', 'skills'], ['project_attachments', 'projects'],
  ['saved_jobs', 'freelancers'], ['saved_jobs', 'projects'],
  ['proposals', 'projects'], ['proposals', 'freelancers'],
  ['contracts', 'projects'], ['contracts', 'freelancers'], ['contracts', 'employers'],
  ['milestones', 'contracts'], ['deliverables', 'milestones'], ['deliverable_files', 'deliverables'],
  ['wallets', 'freelancers'], ['wallets', 'employers'], ['transactions', 'wallets'],
  ['escrow_transactions', 'contracts'], ['escrow_transactions', 'milestones'],
  ['bank_accounts', 'freelancers'], ['bank_accounts', 'employers'],
  ['withdrawal_requests', 'freelancers'], ['withdrawal_requests', 'bank_accounts'], ['withdrawal_requests', 'admins'],
  ['payment_gateway_logs', 'transactions'], ['platform_fee_configs', 'admins'],
  ['reviews', 'contracts'], ['reviews', 'freelancers'], ['reviews', 'employers'],
  ['user_warnings', 'freelancers'], ['user_warnings', 'employers'], ['user_warnings', 'admins'],
  ['disputes', 'contracts'], ['disputes', 'freelancers'], ['disputes', 'employers'],
  ['dispute_evidences', 'disputes'], ['dispute_evidences', 'freelancers'], ['dispute_evidences', 'employers'],
  ['dispute_decisions', 'disputes'], ['dispute_decisions', 'admins'],
  ['kyc_requests', 'freelancers'], ['kyc_requests', 'employers'], ['kyc_requests', 'admins'], ['kyc_documents', 'kyc_requests'],
  ['conversation_participants', 'conversations'], ['conversation_participants', 'freelancers'], ['conversation_participants', 'employers'],
  ['messages', 'conversations'], ['messages', 'freelancers'], ['messages', 'employers'], ['message_attachments', 'messages'],
  ['support_tickets', 'freelancers'], ['support_tickets', 'employers'], ['support_tickets', 'admins'],
  ['ticket_messages', 'support_tickets'], ['ticket_messages', 'freelancers'], ['ticket_messages', 'employers'], ['ticket_messages', 'admins'],
  ['ticket_attachments', 'ticket_messages'],
  ['notifications', 'freelancers'], ['notifications', 'employers'], ['notifications', 'admins'],
  ['newsletter_subscribers', 'freelancers'], ['newsletter_subscribers', 'employers'],
  ['admin_audit_logs', 'admins'],
  
  // CMS & SETTINGS connections
  ['site_settings', 'admins'],
  ['seo_configs', 'admins'],
  ['articles', 'admins'],
  ['articles', 'article_categories']
];
// Deduplicate: one line per unique pair
const seen=new Set();
const E=rawE.filter(([a,b])=>{
  if(a===b)return false;
  const k=[a,b].sort().join('|');
  if(seen.has(k))return false;
  seen.add(k);return true;
});

const pan=document.getElementById('pan'),wrap=document.getElementById('wrap');
let sc=1,ox=0,oy=0,nodes={},drag=null,mx=0,my=0;

T.forEach(t=>{
  const d=document.createElement('div');
  d.className='nd'+(t.t==='a'?' a':t.t==='j'?' j':'');
  d.textContent=t.id;
  d.style.left=t.x+'px';d.style.top=t.y+'px';
  d.dataset.id=t.id;
  pan.appendChild(d);
  nodes[t.id]={el:d,x:t.x,y:t.y,w:0,h:0};
});
Object.values(nodes).forEach(n=>{n.w=n.el.offsetWidth;n.h=n.el.offsetHeight});

const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
svg.id='lines';svg.setAttribute('width','4000');svg.setAttribute('height','2000');
pan.insertBefore(svg,pan.firstChild);

function edgePt(a,b){
  let ax=a.x+a.w/2,ay=a.y+a.h/2,bx=b.x+b.w/2,by=b.y+b.h/2;
  let dx=bx-ax,dy=by-ay;
  let sx,sy;
  if(Math.abs(dx)*a.h>Math.abs(dy)*a.w){sx=ax+(dx>0?a.w/2:-a.w/2);sy=ay+dy*(a.w/2)/Math.abs(dx||1)}
  else{sy=ay+(dy>0?a.h/2:-a.h/2);sx=ax+dx*(a.h/2)/Math.abs(dy||1)}
  let ex,ey;dx=-dx;dy=-dy;
  if(Math.abs(dx)*b.h>Math.abs(dy)*b.w){ex=bx+(dx>0?b.w/2:-b.w/2);ey=by+dy*(b.w/2)/Math.abs(dx||1)}
  else{ey=by+(dy>0?b.h/2:-b.h/2);ex=bx+dx*(b.h/2)/Math.abs(dy||1)}
  return{x1:sx,y1:sy,x2:ex,y2:ey}
}
function arrowPts(x1,y1,x2,y2){
  let a=Math.atan2(y2-y1,x2-x1),s=6;
  return`${x2},${y2} ${x2-s*Math.cos(a-.45)},${y2-s*Math.sin(a-.45)} ${x2-s*Math.cos(a+.45)},${y2-s*Math.sin(a+.45)}`
}
function drawLines(){
  svg.innerHTML='';
  E.forEach(([f,t])=>{
    if(!nodes[f]||!nodes[t])return;
    const p=edgePt(nodes[f],nodes[t]);
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',p.x1);l.setAttribute('y1',p.y1);l.setAttribute('x2',p.x2);l.setAttribute('y2',p.y2);
    svg.appendChild(l);
    const pg=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    pg.setAttribute('points',arrowPts(p.x2,p.y2,p.x1,p.y1)); // point from Parent to Child
    svg.appendChild(pg);
  });
}
drawLines();

// Drag nodes
pan.addEventListener('mousedown',e=>{
  const nd=e.target.closest('.nd');
  if(nd){drag=nodes[nd.dataset.id];mx=e.clientX;my=e.clientY;nd.style.cursor='grabbing';e.preventDefault()}
});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  drag.x+=(e.clientX-mx)/sc;drag.y+=(e.clientY-my)/sc;
  drag.el.style.left=drag.x+'px';drag.el.style.top=drag.y+'px';
  mx=e.clientX;my=e.clientY;drawLines();
});
window.addEventListener('mouseup',()=>{if(drag){drag.el.style.cursor='grab';drag=null}});

// Pan canvas
let panning=false,px,py;
wrap.addEventListener('mousedown',e=>{
  if(e.target===wrap||e.target===pan||e.target===svg){panning=true;px=e.clientX;py=e.clientY;wrap.style.cursor='grabbing'}
});
window.addEventListener('mousemove',e=>{
  if(!panning)return;
  ox+=e.clientX-px;oy+=e.clientY-py;px=e.clientX;py=e.clientY;
  pan.style.transform=`translate(${ox}px,${oy}px) scale(${sc})`;
});
window.addEventListener('mouseup',()=>{if(panning){panning=false;wrap.style.cursor='default'}});

// Zoom
wrap.addEventListener('wheel',e=>{
  e.preventDefault();
  let d=e.deltaY>0?.92:1.08,ns=Math.max(.15,Math.min(3,sc*d));
  let r=wrap.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;
  ox=cx-(cx-ox)*(ns/sc);oy=cy-(cy-oy)*(ns/sc);sc=ns;
  pan.style.transform=`translate(${ox}px,${oy}px) scale(${sc})`;
},{passive:false});

function resetV(){sc=1;ox=0;oy=0;pan.style.transform='translate(0,0) scale(1)'}
function fit(){
  let mn={x:Infinity,y:Infinity},mx2={x:-Infinity,y:-Infinity};
  Object.values(nodes).forEach(n=>{
    if(n.x<mn.x)mn.x=n.x;if(n.y<mn.y)mn.y=n.y;
    if(n.x+n.w>mx2.x)mx2.x=n.x+n.w;if(n.y+n.h>mx2.y)mx2.y=n.y+n.h;
  });
  let w=mx2.x-mn.x+100,h=mx2.y-mn.y+100;
  sc=Math.min(wrap.clientWidth/w,wrap.clientHeight/h,1.5);
  ox=-mn.x*sc+(wrap.clientWidth-w*sc)/2+50*sc;
  oy=-mn.y*sc+(wrap.clientHeight-h*sc)/2+50*sc;
  pan.style.transform=`translate(${ox}px,${oy}px) scale(${sc})`;
}
setTimeout(fit,80);
</script>
</body>
</html>
