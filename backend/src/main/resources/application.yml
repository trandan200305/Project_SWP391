spring:
  application:
    name: cny-backend
  
  # Database Configuration (SQL Server)
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=CNY;encrypt=true;trustServerCertificate=true
    username: sa
    password: YourPassword123!
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  
  # JPA / Hibernate
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate # Do not use update in production, schema is managed manually via SQL scripts
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect

# Server Config
server:
  port: 8080
  servlet:
    context-path: /api

# JWT Properties (Custom)
app:
  jwt:
    secret: this-is-a-very-long-secret-key-for-jwt-signing-so-it-needs-to-be-at-least-256-bits-long
    expiration-ms: 86400000 # 24 hours
